name: Spring Boot CI/CD

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ 소스코드 체크아웃
      - name: Checkout source code
        uses: actions/checkout@v4

      # 2️⃣ JDK 설치
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3️⃣ Gradle 캐시 설정
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      # 4️⃣ gradlew 실행 권한 부여
      - name: Grant execute permission to gradlew
        run: chmod +x gradlew

      # 5️⃣ 테스트 실행
      - name: Run tests
        run: ./gradlew test

      # 6️⃣ JAR 빌드
      - name: Build JAR
        run: ./gradlew build -x test

      # 7️⃣ 서버로 JAR 파일 업로드
      - name: Copy JAR to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          source: "build/libs/*.jar"
          target: "/root/"
          overwrite: true
          strip_components: 2

      # 8️⃣ 서버에서 애플리케이션 재시작
      - name: Deploy and restart application
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          script: |
            set -eu

            # ==============================
            # 애플리케이션 경로 설정
            # ==============================
            APP_DIR="/root"
            JAR_NAME="ticketlion-0.0.1-SNAPSHOT.jar"
            JAR_FILE="$APP_DIR/$JAR_NAME"

            # PID / 로그 파일
            PID_FILE="$APP_DIR/app.pid"
            LOG_FILE="$APP_DIR/app.log"

            echo ">>> 업로드된 파일 확인"
            ls -lh "$APP_DIR"

            # JAR 존재 확인
            test -f "$JAR_FILE"

            echo ">>> 기존 프로세스 종료 (PID 파일 기준)"

            # app.pid가 존재하면 해당 PID 종료
            if [ -f "$PID_FILE" ]; then
              OLD_PID=$(cat "$PID_FILE" || true)

              if [ -n "${OLD_PID:-}" ] && ps -p "$OLD_PID" > /dev/null 2>&1; then
                echo "기존 PID 종료: $OLD_PID"
                kill "$OLD_PID" || true

                sleep 5

                # 종료 안되면 강제 종료
                if ps -p "$OLD_PID" > /dev/null 2>&1; then
                  echo "PID $OLD_PID still alive → 강제 종료"
                  kill -9 "$OLD_PID" || true
                fi
              fi

              rm -f "$PID_FILE"
            fi

            echo ">>> 기존 프로세스 종료 (jar 이름 기준)"

            # 혹시 PID 파일 없이 실행된 프로세스도 종료
            pkill -f "java -jar $JAR_NAME" || true

            sleep 5

            REMAINING_PID=$(pgrep -f "java -jar $JAR_NAME" || true)

            if [ -n "${REMAINING_PID:-}" ]; then
              echo "아직 남아있는 프로세스 강제 종료: $REMAINING_PID"
              pkill -9 -f "java -jar $JAR_NAME" || true
              sleep 3
            fi

            echo ">>> 새 애플리케이션 시작"

            # Spring Boot 애플리케이션 실행
            nohup java -jar "$JAR_FILE" \
              --spring.profiles.active=prod \
              --spring.config.additional-location=file:/root/ \
              > "$LOG_FILE" 2>&1 &

            NEW_PID=$!

            echo "$NEW_PID" > "$PID_FILE"

            echo "새 PID: $NEW_PID"

            echo ">>> 애플리케이션 기동 대기"
            sleep 10

            echo ">>> 프로세스 실행 확인"

            # 새 프로세스가 실제 실행 중인지 확인
            if ! ps -p "$NEW_PID" > /dev/null 2>&1; then
              echo "❌ 애플리케이션 시작 실패"
              tail -n 100 "$LOG_FILE" || true
              exit 1
            fi

            echo ">>> 최근 로그 확인"
            tail -n 50 "$LOG_FILE" || true

            echo "✅ 배포 성공"